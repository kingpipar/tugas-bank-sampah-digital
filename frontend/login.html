<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Bank Sampah Digital</title>
    <meta name="description" content="Login admin dashboard Bank Sampah Digital">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <div class="login-card animate-fade">
        <div class="login-logo">♻️</div>
        <h1 class="login-title">Bank Sampah</h1>
        <p class="login-sub">Admin Dashboard Login</p>

        <form id="loginForm" style="margin-top:32px;">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="admin@gmail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="padding:16px;font-size:16px;margin-top:8px;">
                Login Admin
            </button>
        </form>

        <p style="text-align:center;margin-top:28px;color:#94a3b8;font-size:13px;">Bank Sampah Digital © 2026</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('admin', JSON.stringify(data.user));
                    alert('Login berhasil');
                    window.location.href = 'index.html';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.log(error);
                alert('Server Error');
            }
        });
    </script>
</body>
</html>
